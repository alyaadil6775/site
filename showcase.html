<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saleh Jewelers | Showcase</title>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-QDE0ECDJ2E"></script>
    <script> window.dataLayer = window.dataLayer || []; function gtag(){dataLayer.push(arguments);} gtag('js', new Date()); gtag('config', 'G-QDE0ECDJ2E'); </script>
    <link rel="icon" href="https://www.polisheddiamonds.co.nz/wp-content/uploads/2023/02/lab-grown-diamond.png" type="image/x-icon">
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }

        /* Header sits on top, z-index above iframe */
        #site-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
        }

        /* Iframe fills everything below the header, never overlaps it */
        .iframe-wrapper {
            position: fixed;
            left: 0;
            width: 100%;
            bottom: 0;
            /* top is set dynamically by JS after header loads */
            top: 70px;
            overflow: hidden;
            background: #fff;
        }

        iframe.main-content {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        #site-footer { display: none; } /* Footer doesn't make sense inside a fixed iframe layout */
    </style>
</head>
<body>

    <div id="site-header"></div>

    <div class="iframe-wrapper" id="iframeWrapper">
        <iframe
            class="main-content"
            scrolling="yes"
            frameborder="0"
            sandbox="allow-scripts allow-forms allow-same-origin allow-popups allow-modals allow-top-navigation"
            src="https://salehjewelery-frame-categoryembed.jewelershowcase.com/">
        </iframe>
    </div>

    <script>
        async function loadComponent(file, targetId, callback) {
            try {
                const res = await fetch(file);
                if (!res.ok) throw new Error('Could not load ' + file);
                document.getElementById(targetId).innerHTML = await res.text();
                if (typeof callback === 'function') callback();
            } catch (err) { console.error(err); }
        }

        function initMobileMenu() {
            const menu     = document.querySelector('#mobile-menu');
            const navLinks = document.querySelector('#nav-list');
            if (!menu || !navLinks) return;
            menu.addEventListener('click', () => {
                menu.classList.toggle('is-active');
                navLinks.classList.toggle('active');
            });
            navLinks.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', () => {
                    menu.classList.remove('is-active');
                    navLinks.classList.remove('active');
                });
            });

            // Re-measure header on menu open/close in case height changes
            adjustIframe();
        }

        function adjustIframe() {
            const header  = document.querySelector('#site-header header') ||
                            document.querySelector('#site-header > *');
            const wrapper = document.getElementById('iframeWrapper');
            if (header && wrapper) {
                const h = header.getBoundingClientRect().height;
                wrapper.style.top = h + 'px';
            }
        }

        // Load header, then measure and pin iframe below it
        loadComponent('assets/components/header/header.html', 'site-header', () => {
            initMobileMenu();
            adjustIframe();

            // Re-adjust on window resize (e.g. mobile rotation)
            window.addEventListener('resize', adjustIframe);
        });
    </script>

</body>
</html>
