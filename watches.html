<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saleh Jewelers | Watch Catalog</title>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-QDE0ECDJ2E"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){ dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-QDE0ECDJ2E');
    </script>

    <link rel="icon" href="https://www.polisheddiamonds.co.nz/wp-content/uploads/2023/02/lab-grown-diamond.png" type="image/x-icon">
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        .showcase-wrapper {
            padding-top: 80px;
            min-height: 100vh;
            background: #f5f5f5;
        }

        .showcase-hero {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            padding: 4rem 2rem 3.5rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .showcase-hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 70% 50%, rgba(212,175,55,0.08) 0%, transparent 60%);
            pointer-events: none;
        }

        .showcase-hero h1 {
            font-family: 'Georgia', serif;
            font-size: 2.8rem;
            color: #d4af37;
            letter-spacing: 4px;
            text-transform: uppercase;
            position: relative;
            z-index: 1;
            margin-bottom: 0.8rem;
        }

        .showcase-hero h1::after {
            content: '';
            display: block;
            width: 50px;
            height: 2px;
            background: #d4af37;
            margin: 0.8rem auto 0;
        }

        .showcase-hero p {
            color: rgba(255,255,255,0.6);
            font-size: 1rem;
            position: relative;
            z-index: 1;
            margin-top: 1rem;
        }

        .catalog-toolbar {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 2rem 0;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-box {
            flex: 1;
            min-width: 220px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.8rem;
            border: 1.5px solid #e0e0e0;
            border-radius: 2px;
            font-size: 0.9rem;
            background: #fff;
            color: #1a1a1a;
            outline: none;
            transition: border-color 0.25s, box-shadow 0.25s;
        }

        .search-box input:focus {
            border-color: #d4af37;
            box-shadow: 0 0 0 3px rgba(212,175,55,0.12);
        }

        .search-box i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #d4af37;
            font-size: 0.85rem;
        }

        .filter-select {
            padding: 0.75rem 1rem;
            border: 1.5px solid #e0e0e0;
            border-radius: 2px;
            font-size: 0.88rem;
            background: #fff;
            color: #1a1a1a;
            outline: none;
            cursor: pointer;
            transition: border-color 0.25s;
        }

        .filter-select:focus { border-color: #d4af37; }

        .results-count {
            font-size: 0.82rem;
            color: #999;
            margin-left: auto;
            white-space: nowrap;
        }

        .catalog-grid {
            max-width: 1200px;
            margin: 2rem auto 5rem;
            padding: 0 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.8rem;
        }

        .product-card {
            background: #fff;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
            border: 1px solid #eee;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.12);
            border-color: #d4af37;
        }

        .product-card:hover .card-overlay { opacity: 1; }

        .card-img-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            background: #f9f9f9;
            overflow: hidden;
        }

        .card-img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .product-card:hover .card-img-wrap img { transform: scale(1.05); }

        .card-overlay {
            position: absolute;
            inset: 0;
            background: rgba(26,26,26,0.55);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .card-overlay span {
            color: #d4af37;
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: 1px solid #d4af37;
            padding: 0.6rem 1.4rem;
        }

        .card-img-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a1a, #2d2d2d);
            color: #d4af37;
            font-size: 3rem;
        }

        .card-body {
            padding: 1.2rem 1.4rem 1.4rem;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
            border-top: 3px solid #d4af37;
        }

        .card-brand {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #d4af37;
        }

        .card-name {
            font-family: 'Georgia', serif;
            font-size: 1rem;
            color: #1a1a1a;
            line-height: 1.4;
            margin-top: 0.1rem;
        }

        .card-desc {
            font-size: 0.75rem;
            color: #888;
            margin-top: 0.2rem;
            line-height: 1.4;
        }

        .card-ref {
            font-size: 0.72rem;
            color: #bbb;
            margin-top: 0.1rem;
        }

        .card-price {
            font-size: 1rem;
            font-weight: 700;
            color: #1a1a1a;
            margin-top: auto;
            padding-top: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            flex-wrap: wrap;
        }

        .card-reserved {
            display: inline-block;
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #fff;
            background: #b0842a;
            padding: 3px 10px;
            border-radius: 2px;
        }

        .card-papers {
            display: inline-block;
            font-size: 0.68rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #d4af37;
            border: 1px solid #d4af37;
            padding: 2px 8px;
            border-radius: 2px;
        }

        /* Empty / loading states */
        .state-message {
            grid-column: 1 / -1;
            text-align: center;
            padding: 5rem 2rem;
            color: #aaa;
        }

        .state-message i {
            font-size: 3rem;
            color: #d4af37;
            display: block;
            margin-bottom: 1rem;
        }

        .state-message h3 {
            font-family: 'Georgia', serif;
            color: #1a1a1a;
            margin-bottom: 0.5rem;
        }

        .spinner-ring {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(212,175,55,0.2);
            border-top-color: #d4af37;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            margin: 0 auto 1.5rem;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── POPUP ── */
        .popup-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(10,10,10,0.85);
            z-index: 3000;
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .popup-overlay.open { display: flex; }

        .popup-box {
            background: #fff;
            border-radius: 4px;
            max-width: 820px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 40px 80px rgba(0,0,0,0.5);
            border-top: 5px solid #d4af37;
            animation: popIn 0.35s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
        }

        @keyframes popIn {
            from { opacity: 0; transform: translateY(20px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .popup-close {
            position: absolute;
            top: 14px;
            right: 16px;
            background: none;
            border: none;
            font-size: 1.4rem;
            color: #aaa;
            cursor: pointer;
            transition: color 0.2s;
            z-index: 1;
            line-height: 1;
        }

        .popup-close:hover { color: #d4af37; }

        .popup-inner {
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        .popup-img-panel {
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            min-height: 380px;
        }

        .popup-img-panel img {
            width: 100%;
            max-height: 380px;
            object-fit: contain;
            border-radius: 2px;
        }

        .popup-img-placeholder {
            color: #d4af37;
            font-size: 5rem;
        }

        .popup-details {
            padding: 2.5rem 2.5rem 2rem;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .popup-brand {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #d4af37;
        }

        .popup-name {
            font-family: 'Georgia', serif;
            font-size: 1.6rem;
            color: #1a1a1a;
            line-height: 1.3;
            margin: 0.3rem 0 0.6rem;
        }

        .popup-ref {
            font-size: 0.8rem;
            color: #aaa;
            margin-bottom: 1rem;
        }

        .popup-price {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1a1a1a;
            padding: 1rem 0;
            border-top: 1px solid #eee;
            border-bottom: 1px solid #eee;
            margin: 0.5rem 0 1rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .popup-reserved-badge {
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #fff;
            background: #b0842a;
            padding: 4px 12px;
            border-radius: 2px;
        }

        .popup-details-list {
            list-style: none;
            padding: 0;
            margin: 0;
            flex: 1;
        }

        .popup-details-list li {
            font-size: 0.85rem;
            color: #555;
            padding: 0.5rem 0;
            border-bottom: 1px solid #f5f5f5;
            display: flex;
            gap: 0.6rem;
            align-items: flex-start;
        }

        .popup-details-list li i {
            color: #d4af37;
            font-size: 0.55rem;
            margin-top: 5px;
            flex-shrink: 0;
        }

        .popup-actions {
            margin-top: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .popup-btn-primary {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 0.9rem 1.5rem;
            background: #d4af37;
            color: #1a1a1a;
            border: none;
            border-radius: 2px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .popup-btn-primary:hover {
            background: #f0c14b;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(212,175,55,0.3);
        }

        .popup-btn-secondary {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 0.9rem 1.5rem;
            background: transparent;
            color: #1a1a1a;
            border: 1.5px solid #ddd;
            border-radius: 2px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .popup-btn-secondary:hover {
            border-color: #d4af37;
            color: #d4af37;
        }

        .no-data-banner {
            background: #1a1a1a;
            border: 1px solid #d4af37;
            border-radius: 4px;
            padding: 2rem 2.5rem;
            margin: 3rem auto;
            max-width: 700px;
            color: #fff;
        }

        .no-data-banner h3 {
            font-family: 'Georgia', serif;
            color: #d4af37;
            margin-bottom: 1rem;
        }

        .no-data-banner code {
            background: #2d2d2d;
            color: #d4af37;
            padding: 0.2rem 0.5rem;
            border-radius: 2px;
            font-size: 0.85rem;
        }

        .no-data-banner ol {
            padding-left: 1.5rem;
            color: rgba(255,255,255,0.75);
            line-height: 2;
            font-size: 0.9rem;
        }


        /* ── Pagination ── */
        .pagination {
            max-width: 1200px;
            margin: 0 auto 4rem;
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            flex-wrap: wrap;
        }

        .pagination button {
            min-width: 38px;
            height: 38px;
            padding: 0 0.7rem;
            border: 1.5px solid #e0e0e0;
            border-radius: 2px;
            background: #fff;
            color: #1a1a1a;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .pagination button:hover:not(:disabled) {
            border-color: #d4af37;
            color: #d4af37;
        }

        .pagination button.active {
            background: #d4af37;
            border-color: #d4af37;
            color: #1a1a1a;
            font-weight: 700;
        }

        .pagination button:disabled {
            opacity: 0.35;
            cursor: default;
        }

        .pagination .page-info {
            font-size: 0.82rem;
            color: #999;
            padding: 0 0.5rem;
        }


        /* ── Detail gallery thumbnails ── */
        .popup-thumbs {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            justify-content: center;
            padding: 0.8rem 1rem;
            background: #111;
        }
        .popup-thumb {
            width: 52px;
            height: 52px;
            object-fit: cover;
            border: 2px solid transparent;
            border-radius: 2px;
            cursor: pointer;
            opacity: 0.6;
            transition: all 0.2s;
        }
        .popup-thumb:hover, .popup-thumb.active {
            border-color: #d4af37;
            opacity: 1;
        }

        /* ── Specs grid ── */
        .popup-specs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.3rem 1rem;
            margin: 0.8rem 0;
        }
        .popup-spec-item {
            font-size: 0.78rem;
            color: #555;
            padding: 0.3rem 0;
            border-bottom: 1px solid #f5f5f5;
        }
        .popup-spec-item span:first-child {
            display: block;
            font-size: 0.68rem;
            color: #bbb;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 1px;
        }
        .popup-spec-item span:last-child {
            font-weight: 600;
            color: #1a1a1a;
        }
        @media (max-width: 768px) {
            .pagination { gap: 0.25rem; }
            .pagination button { min-width: 32px; height: 32px; font-size: 0.78rem; }
        }
        @media (max-width: 768px) {
            .showcase-hero h1  { font-size: 2rem; }
            .catalog-toolbar   { padding: 1.5rem 1rem 0; }
            .catalog-grid      { padding: 0 1rem; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem; }
            .popup-inner       { grid-template-columns: 1fr; }
            .popup-img-panel   { min-height: 260px; }
            .popup-details     { padding: 1.5rem; }
            .popup-name        { font-size: 1.3rem; }
            .results-count     { display: none; }
        }
    </style>
</head>
<body>

    <div id="site-header"></div>

    <div class="showcase-wrapper">

        <div class="showcase-hero">
            <h1>Watch Catalog</h1>
            <p>Browse our curated selection of luxury timepieces</p>
        </div>

        <div class="catalog-toolbar">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search by name, brand, or reference...">
            </div>
            <select class="filter-select" id="brandFilter">
                <option value="">All Brands</option>
            </select>
            <select class="filter-select" id="priceFilter">
                <option value="">All Prices</option>
                <option value="0-5000">Under $5,000</option>
                <option value="5000-15000">$5,000 – $15,000</option>
                <option value="15000-30000">$15,000 – $30,000</option>
                <option value="30000-999999">$30,000+</option>
            </select>
            <span class="results-count" id="resultsCount"></span>
        </div>

        <div class="catalog-grid" id="catalogGrid">
            <div class="state-message">
                <div class="spinner-ring"></div>
                <h3>Loading Catalog</h3>
                <p>Fetching watch inventory...</p>
            </div>
        </div>

        <div class="pagination-wrap">
            <div class="pagination-count" id="paginationCount"></div>
            <div class="pagination" id="pagination"></div>
        </div>

    </div>

    <!-- Popup Modal -->
    <div class="popup-overlay" id="popupOverlay">
        <div class="popup-box">
            <button class="popup-close" id="popupClose" aria-label="Close">×</button>
            <div class="popup-inner">
                <div>
                    <div class="popup-img-panel" id="popupImgPanel">
                        <i class="fas fa-clock popup-img-placeholder"></i>
                    </div>
                    <div class="popup-thumbs" id="popupThumbs" style="display:none"></div>
                </div>
                <div class="popup-details">
                    <div class="popup-brand" id="popupBrand"></div>
                    <div class="popup-name"  id="popupName"></div>
                    <div class="popup-ref"   id="popupRef"></div>
                    <div class="popup-price" id="popupPrice"></div>
                    <ul class="popup-details-list" id="popupDetailsList"></ul>
                    <div class="popup-actions">
                        <a href="tel:+16784042048" class="popup-btn-primary">
                            <i class="fas fa-phone"></i> Call to Inquire
                        </a>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="site-footer"></div>

    <script>
        async function loadComponent(file, targetId, callback) {
            try {
                const res = await fetch(file);
                if (!res.ok) throw new Error('Could not load ' + file);
                document.getElementById(targetId).innerHTML = await res.text();
                if (typeof callback === 'function') callback();
            } catch (err) { console.error(err); }
        }

        function initMobileMenu() {
            const menu     = document.querySelector('#mobile-menu');
            const navLinks = document.querySelector('#nav-list');
            if (!menu || !navLinks) return;
            menu.addEventListener('click', () => {
                menu.classList.toggle('is-active');
                navLinks.classList.toggle('active');
            });
            navLinks.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', () => {
                    menu.classList.remove('is-active');
                    navLinks.classList.remove('active');
                });
            });
        }

        loadComponent('assets/components/header/header.html', 'site-header', initMobileMenu);
        loadComponent('assets/components/footer/footer.html', 'site-footer');

        const PAGE_SIZE   = 48;
        let allProducts   = [];
        let filteredList  = [];
        let currentPage   = 1;

        async function loadCatalog() {
            try {
                const res = await fetch('catalog.json?v=' + Date.now());
                if (!res.ok) throw new Error('not found');
                allProducts  = await res.json();
                filteredList = allProducts.filter(p => !p.reserved);
                buildBrandFilter();
                renderPage();
            } catch (err) {
                showNoCatalog();
            }
        }

        function buildBrandFilter() {
            const brands = [...new Set(allProducts.map(p => p.brand).filter(Boolean))].sort();
            const sel = document.getElementById('brandFilter');
            brands.forEach(b => {
                const opt = document.createElement('option');
                opt.value = b; opt.textContent = b;
                sel.appendChild(opt);
            });
        }

        function parsePrice(str) {
            return parseFloat((str || '').replace(/[^0-9.]/g, '')) || 0;
        }

        function markupPrice(str) {
            if (!str || str === 'Contact for price') return str;
            const num = parsePrice(str);
            if (!num) return str;
            const marked = Math.round(num * 1.10 / 10) * 10;
            return '$' + marked.toLocaleString('en-US');
        }

        function applyFilters() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const brand  = document.getElementById('brandFilter').value;
            const price  = document.getElementById('priceFilter').value;

            filteredList = allProducts.filter(p => !p.reserved).filter(p => {
                const matchSearch = !search ||
                    (p.name        || '').toLowerCase().includes(search) ||
                    (p.brand       || '').toLowerCase().includes(search) ||
                    (p.reference   || '').toLowerCase().includes(search) ||
                    (p.description || '').toLowerCase().includes(search);
                const matchBrand = !brand || p.brand === brand;
                let matchPrice = true;
                if (price) {
                    const [min, max] = price.split('-').map(Number);
                    const val = parsePrice(p.price);
                    matchPrice = val >= min && val <= max;
                }
                return matchSearch && matchBrand && matchPrice;
            });

            currentPage = 1;
            renderPage();
        }

        function renderPage() {
            const totalPages = Math.ceil(filteredList.length / PAGE_SIZE);
            const start      = (currentPage - 1) * PAGE_SIZE;
            const end        = Math.min(start + PAGE_SIZE, filteredList.length);
            const pageItems  = filteredList.slice(start, end);

            document.getElementById('resultsCount').textContent =
                filteredList.length + ' item' + (filteredList.length !== 1 ? 's' : '');

            // "Showing X of Y watches"
            document.getElementById('paginationCount').textContent =
                `Showing ${start + 1}–${end} of ${filteredList.length} watches`;

            renderGrid(pageItems);
            renderPagination(totalPages);

            // Scroll to top of grid when page changes
            document.querySelector('.showcase-wrapper').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function renderPagination(totalPages) {
            const bar   = document.getElementById('pagination');
            const count = document.getElementById('paginationCount');
            if (totalPages <= 1) { bar.innerHTML = ''; count.textContent = ''; return; }

            bar.innerHTML = `
                <button ${currentPage === 1 ? 'disabled' : ''} onclick="goToPage(${currentPage - 1})">
                    Previous
                </button>
                <span class="page-info">Page ${currentPage} of ${totalPages}</span>
                <button ${currentPage === totalPages ? 'disabled' : ''} onclick="goToPage(${currentPage + 1})">
                    Next
                </button>
            `;
        }

        function goToPage(n) {
            currentPage = n;
            renderPage();
        }

        function renderGrid(products) {
            const grid = document.getElementById('catalogGrid');

            if (products.length === 0) {
                grid.innerHTML = `<div class="state-message">
                    <i class="fas fa-search"></i>
                    <h3>No Results</h3>
                    <p>Try adjusting your search or filters.</p>
                </div>`;
                return;
            }

            grid.innerHTML = products.map(p => `
                <div class="product-card" data-id="${p.id}" tabindex="0" role="button" aria-label="${p.name}">
                    <div class="card-img-wrap">
                        ${p.image ? `<img src="${p.image}" alt="${p.name}" loading="lazy"
                            onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : ''}
                        <div class="card-img-placeholder" style="${p.image ? 'display:none' : ''}">
                            <i class="fas fa-clock"></i>
                        </div>
                        <div class="card-overlay"><span>View Details</span></div>
                    </div>
                    <div class="card-body">
                        ${p.brand ? `<div class="card-brand">${p.brand}</div>` : ''}
                        <div class="card-name">${p.name}</div>
                        ${p.description ? `<div class="card-desc">${p.description}</div>` : ''}
                        <div class="card-price">
                            <span>${p.reserved ? '' : markupPrice(p.price)}</span>
                            ${p.reserved ? '<span class="card-reserved">Reserved</span>' : ''}
                            ${p.hasCard   ? '<span class="card-papers">Papers</span>'   : ''}
                        </div>
                    </div>
                </div>
            `).join('');

            grid.querySelectorAll('.product-card').forEach(card => {
                const open = () => openPopup(parseInt(card.dataset.id));
                card.addEventListener('click', open);
                card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') open(); });
            });
        }

        function openPopup(id) {
            const p = allProducts.find(x => x.id === id);
            if (!p) return;

            // ── Main image + gallery thumbnails ──
            const imgPanel  = document.getElementById('popupImgPanel');
            const thumbsEl  = document.getElementById('popupThumbs');
            const imgs      = (p.images && p.images.length) ? p.images : (p.image ? [p.image] : []);

            if (imgs.length) {
                imgPanel.innerHTML = `<img src="${imgs[0]}" alt="${p.name}" id="popupMainImg">`;
            } else {
                imgPanel.innerHTML = `<i class="fas fa-clock popup-img-placeholder"></i>`;
            }

            if (imgs.length > 1) {
                thumbsEl.style.display = 'flex';
                thumbsEl.innerHTML = imgs.map((src, i) =>
                    `<img src="${src}" class="popup-thumb ${i===0?'active':''}" data-src="${src}" alt="View ${i+1}">`
                ).join('');
                thumbsEl.querySelectorAll('.popup-thumb').forEach(t => {
                    t.addEventListener('click', () => {
                        document.getElementById('popupMainImg').src = t.dataset.src;
                        thumbsEl.querySelectorAll('.popup-thumb').forEach(x => x.classList.remove('active'));
                        t.classList.add('active');
                    });
                });
            } else {
                thumbsEl.style.display = 'none';
                thumbsEl.innerHTML = '';
            }

            // ── Text fields ──
            document.getElementById('popupBrand').textContent = p.brand || '';
            document.getElementById('popupName').textContent  = p.name  || '';
            document.getElementById('popupRef').textContent   = p.reference ? 'Ref. ' + p.reference : '';

            const priceEl = document.getElementById('popupPrice');
            priceEl.innerHTML = `${markupPrice(p.price) || 'Contact for price'}
                ${p.reserved ? '<span class="popup-reserved-badge">Reserved</span>' : ''}`;

            // ── Specs grid (new rich data) ──
            const specFields = [
                p.condition    && { label: 'Condition',  val: p.condition  },
                p.dial         && { label: 'Dial',       val: p.dial       },
                p.bezel        && { label: 'Bezel',      val: p.bezel      },
                p.bracelet     && { label: 'Bracelet',   val: p.bracelet   },
                p.material     && { label: 'Material',   val: p.material   },
                p.size         && { label: 'Size',       val: p.size       },
                p.year         && { label: 'Year',       val: p.year       },
                p.series       && { label: 'Series',     val: p.series     },
                p.gender       && { label: 'Gender',     val: p.gender     },
                p.hasCard      && { label: 'Papers',     val: 'Included'   },
                p.serialNumber && { label: 'Serial',     val: p.serialNumber },
                p.sku          && { label: 'SKU',        val: p.sku        },
                p.reserved     && { label: 'Status',     val: 'Reserved'   },
            ].filter(Boolean);

            const listEl = document.getElementById('popupDetailsList');
            if (specFields.length) {
                listEl.innerHTML = `<div class="popup-specs">` +
                    specFields.map(s =>
                        `<div class="popup-spec-item"><span>${s.label}</span><span>${s.val}</span></div>`
                    ).join('') +
                `</div>`;
            } else {
                listEl.innerHTML = '<li><i class="fas fa-circle"></i><span>Contact us for full specifications.</span></li>';
            }

            document.getElementById('popupOverlay').classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closePopup() {
            document.getElementById('popupOverlay').classList.remove('open');
            document.body.style.overflow = '';
        }

        document.getElementById('popupClose').addEventListener('click', closePopup);
        document.getElementById('popupOverlay').addEventListener('click', e => {
            if (e.target === document.getElementById('popupOverlay')) closePopup();
        });
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closePopup(); });

        document.getElementById('searchInput').addEventListener('input', () => { currentPage = 1; applyFilters(); });
        document.getElementById('brandFilter').addEventListener('change', applyFilters);
        document.getElementById('priceFilter').addEventListener('change', applyFilters);

        function showNoCatalog() {
            document.getElementById('catalogGrid').innerHTML = `
                <div class="state-message">
                    <div class="no-data-banner">
                        <h3><i class="fas fa-info-circle"></i> Catalog Not Yet Generated</h3>
                        <p>To display watch inventory, run the scraper on your local machine:</p>
                        <ol>
                            <li>Make sure <strong>Node.js</strong> is installed</li>
                            <li>Run: <code>npm install puppeteer</code></li>
                            <li>Run: <code>node scrape-catalog.js</code></li>
                            <li>Push the generated <code>catalog.json</code> to GitHub</li>
                        </ol>
                    </div>
                </div>`;
        }

        loadCatalog();
    </script>

</body>
</html>
