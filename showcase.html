<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saleh Jewelers | Portal</title>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-QDE0ECDJ2E"></script>
    <script> window.dataLayer = window.dataLayer || []; function gtag(){dataLayer.push(arguments);} gtag('js', new Date()); gtag('config', 'G-QDE0ECDJ2E'); </script>
    <link rel="icon" href="https://www.polisheddiamonds.co.nz/wp-content/uploads/2023/02/lab-grown-diamond.png" type="image/x-icon">
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { overflow: hidden; }

        .iframe-wrapper {
            margin-top: 70px;
            width: 100%;
            height: calc(100vh - 70px);
            background: #fff;
            overflow: hidden;
        }

        iframe.main-content {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div id="site-header"></div>

    <main class="iframe-wrapper">
        <iframe
            class="main-content"
            style="width: 1px; min-width: 100%;"
            scrolling="yes"
            frameborder="0"
            sandbox="allow-scripts allow-forms allow-same-origin allow-popups allow-modals"
            src="https://salehjewelery-frame-categoryembed.jewelershowcase.com/">
        </iframe>
    </main>

    <div id="site-footer"></div>

    <script>
        async function loadComponent(file, targetId, callback) {
            try {
                const res = await fetch(file);
                if (!res.ok) throw new Error('Could not load ' + file);
                document.getElementById(targetId).innerHTML = await res.text();
                if (typeof callback === 'function') callback();
            } catch (err) { console.error(err); }
        }

        function initMobileMenu() {
            const menu     = document.querySelector('#mobile-menu');
            const navLinks = document.querySelector('#nav-list');
            if (!menu || !navLinks) return;
            menu.addEventListener('click', () => {
                menu.classList.toggle('is-active');
                navLinks.classList.toggle('active');
            });
            navLinks.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', () => {
                    menu.classList.remove('is-active');
                    navLinks.classList.remove('active');
                });
            });
        }

        loadComponent('assets/components/header/header.html', 'site-header', initMobileMenu);
        loadComponent('assets/components/footer/footer.html', 'site-footer');
    </script>

</body>
</html>
