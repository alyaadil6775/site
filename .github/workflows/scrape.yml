name: Scrape Swiss Time Catalog

on:
  # Run every 2 hours
  schedule:
    - cron: '0 */2 * * *'
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  scrape:
    timeout-minutes: 15
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Install dependencies (Puppeteer + bundled Chrome)
      - name: Install dependencies
        run: npm install

      # 4. Run the scraper — outputs catalog.json to repo root
      - name: Run scraper
        run: node scrape-catalog.js
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'false'

      # 5. Commit and push catalog.json if it changed
      - name: Commit updated catalog
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add catalog.json
          # Only commit if catalog.json actually changed
          git diff --cached --quiet || git commit -m "chore: update watch catalog [$(date -u '+%Y-%m-%d %H:%M UTC')]"

      - name: Push changes
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
