<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saleh Jewelers | Portal</title>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-QDE0ECDJ2E"></script>
    <script> window.dataLayer = window.dataLayer || []; function gtag(){dataLayer.push(arguments);} gtag('js', new Date()); gtag('config', 'G-QDE0ECDJ2E'); </script>
    <link rel="icon" href="https://www.polisheddiamonds.co.nz/wp-content/uploads/2023/02/lab-grown-diamond.png" type="image/x-icon">

    <style>
        :root {
            --gold: #d4af37;
            --gold-hover: #f0c14b;
            --dark: #1a1a1a;
            --light-gray: #f9f9f9;
            --text: #333;
            --white: #ffffff;
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: var(--text);
            background-color: var(--white);
            overflow: hidden; /* Prevent double scrollbars (body + iframe) */
        }

        /* --- Navigation --- */
        header {
            background: rgba(255, 255, 255, 0.98);
            padding: 1rem 0;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
        }

        nav {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
        }

        .logo {
            font-family: 'Georgia', serif;
            font-size: 1.6rem;
            font-weight: bold;
            letter-spacing: 2px;
            color: var(--dark);
            text-decoration: none;
            z-index: 1001;
        }

        .logo span { color: var(--gold); }

        nav ul {
            display: flex;
            list-style: none;
            gap: 1.5rem;
        }

        nav a {
            color: var(--dark);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: var(--transition);
        }

        nav a:hover { color: var(--gold); }

        /* --- Mobile Menu Toggle --- */
        .menu-toggle {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 6px;
            z-index: 1001;
        }

        .menu-toggle .bar {
            width: 25px;
            height: 3px;
            background-color: var(--dark);
            transition: var(--transition);
            border-radius: 2px;
        }

        /* --- Iframe Container --- */
        .iframe-wrapper {
            margin-top: 70px; /* Offset for the fixed header */
            width: 100%;
            height: calc(100vh - 70px); /* Fill remaining viewport height */
            background: #fff;
        }

        iframe.main-content {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* --- Mobile Responsive Navigation --- */
        @media (max-width: 768px) {
            .menu-toggle { display: flex; }

            nav ul {
                position: fixed;
                right: -100%;
                top: 0;
                flex-direction: column;
                background-color: var(--white);
                width: 75%;
                height: 100vh;
                padding: 100px 2rem;
                box-shadow: -10px 0 30px rgba(0,0,0,0.1);
                transition: var(--transition);
                gap: 2rem;
            }

            nav ul.active { right: 0; }

            .menu-toggle.is-active .bar:nth-child(2) { opacity: 0; }
            .menu-toggle.is-active .bar:nth-child(1) { transform: translateY(9px) rotate(45deg); }
            .menu-toggle.is-active .bar:nth-child(3) { transform: translateY(-9px) rotate(-45deg); }
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <a href="index.html" class="logo">SALEH <span>JEWELERS</span></a>
            
            <div class="menu-toggle" id="mobile-menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>

            <ul id="nav-list">
                <li><a href="index.html#home">Home</a></li>
                <li><a href="index.html#materials">Materials</a></li>
                <li><a href="index.html#services">Services</a></li>
                <li><a href="index.html#catalog">Catalog</a></li> 
                <li><a href="newsletter">Newsletter</a></li> 
                <li><a href="index.html#contact">Contact</a></li>
                <li><a href="promotions.html">Promotions</a></li>
            </ul>
        </nav>
    </header>

    <main class="iframe-wrapper">                    
             <iframe style="width: 1px; min-width: 100%;" scrolling="yes" width="100%" height="1500px" frameborder="0" sandbox="allow-scripts allow-forms allow-same-origin" src="https://salehjewelery-frame-categoryembed.jewelershowcase.com/"></iframe>
    </main>

    <script>
        const menu = document.querySelector('#mobile-menu');
        const navLinks = document.querySelector('#nav-list');

        menu.addEventListener('click', function() {
            menu.classList.toggle('is-active');
            navLinks.classList.toggle('active');
        });

        document.querySelectorAll('#nav-list a').forEach(link => {
            link.addEventListener('click', () => {
                menu.classList.remove('is-active');
                navLinks.classList.remove('active');
            });
        });
    </script>

</body>
</html>
